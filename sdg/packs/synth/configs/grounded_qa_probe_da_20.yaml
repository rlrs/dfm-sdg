pack: synth
reuse_completed: false
models:
  query_teacher:
    endpoint: openai
    max_concurrency: 10
    max_retries: 8
    timeout_seconds: 900
  reasoning_teacher:
    endpoint: openai
    max_concurrency: 10
    max_retries: 8
    timeout_seconds: 900
  answer_teacher:
    endpoint: openai
    max_concurrency: 10
    max_retries: 8
    timeout_seconds: 900
  judge:
    endpoint: openai
    max_concurrency: 10
    max_retries: 8
    timeout_seconds: 900
memory_core:
  source: wikipedia_vital_articles
  source_language: en
  vital_level: 4
  max_articles: 100
  expand_with:
    - wikidata
  fetch_batch_size: 20
  request_pause_seconds: 0.05
  chunk_size: 120
  chunk_overlap: 30
generation:
  families:
    - grounded_qa
  max_rows_per_family: 20
  train_fraction: 0.8
  grounded_qa:
    lead_sentences: 8
    max_sentences_per_doc: 1
    min_sentence_words: 5
    max_sentence_words: 110
    structured_facts: 4
    min_sources: 2
    bridge_sources: 4
    retrieve_top_k: 8
    language_plan:
      prompt: da
      reasoning: da
      target: da
    personas:
      source: preset
      preset: starter
    query_profiles:
      source: preset
      preset: starter
    assistant_style:
      source: preset
      preset: starter
