pack: synth
reuse_completed: true
models:
  query_teacher: openai
  reasoning_teacher: openai
  answer_teacher: openai
  judge: openai
memory_core:
  source: wikipedia_vital_articles
  language: en
  vital_level: 4
  expand_with:
    - structured_wikipedia
    - wikidata
  fetch_batch_size: 20
  request_pause_seconds: 0.05
  chunk_size: 120
  chunk_overlap: 30
generation:
  families:
    - memorization
  max_rows_per_family: 200
  train_fraction: 0.9
  memorization:
    lead_sentences: 10
    max_sentences_per_doc: 5
    min_sentence_words: 5
    max_sentence_words: 110
    support_sentences: 3
    structured_facts: 4
    retrieve_top_k: 5
    personas:
      source: preset
      preset: starter
    query_profiles:
      source: preset
      preset: starter
    assistant_style:
      source: preset
      preset: starter
  grounded_qa:
    lead_sentences: 8
    max_sentences_per_doc: 3
    min_sentence_words: 5
    max_sentence_words: 110
    structured_facts: 4
    min_sources: 2
    bridge_sources: 3
    retrieve_top_k: 6
    personas:
      source: preset
      preset: starter
    query_profiles:
      source: preset
      preset: starter
    assistant_style:
      source: preset
      preset: starter
