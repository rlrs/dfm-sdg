pack: translation
reuse_completed: false
source:
  dataset: oliverkinch/machine-translation-da-en
  split: train
  streaming: true
  danish_field: danish
  english_field: english
  origin_field: source
generation:
  max_pairs: 100447
  max_pairs_per_source: 4300
  prompt_languages:
    - da
    - en
  directions:
    - da-en
    - en-da
  template_styles:
    - translate_into
    - from_to
    - translator_role
    - strict_instructions
    - minimal_output
    - marked_text_only
    - json_field_only
    - json_object_output
    - json_object_meta_output
    - json_object_source_output
    - xml_output
    - xml_meta_output
    - yaml_output
    - yaml_meta_output
    - yaml_source_output
    - json_string_output
  train_fraction: 0.9
